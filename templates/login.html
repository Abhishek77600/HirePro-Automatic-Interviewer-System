<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - AI Interview Platform</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body { 
      font-family: 'Inter', sans-serif;
      background-color: #030712;
      background-image: linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px), 
                        linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
      background-size: 2rem 2rem;
      min-height: 100vh;
    }
    .glass-card {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(10px);
      box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
    }
    .toggle-bg {
      transition: transform 0.3s ease;
    }
  </style>
</head>
<body>
  <div class="min-h-screen flex items-center justify-center p-4">
    <div class="w-full max-w-md">
      <!-- Logo + Title -->
      <div class="text-center mb-8">
        <div class="inline-block p-3 bg-indigo-600 rounded-2xl shadow-lg mb-4">
          <svg class="h-12 w-12 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" d="M9 17.25v1.007a3 3 0 01-.879 2.122L7.5 21h9l-1.621-.621A3 3 0 0115 18.257V17.25m6-12V15a2.25 2.25 0 01-2.25 2.25H5.25A2.25 2.25 0 013 15V5.25A2.25 2.25 0 015.25 3h13.5A2.25 2.25 0 0121 5.25zm-6-2.25h.008v.008H15V3z" />
          </svg>
        </div>
        <h1 class="text-3xl font-bold text-white">AI Interview Platform</h1>
        <p class="text-gray-400 mt-2">Smart hiring made simple</p>
      </div>

      <!-- Auth Card -->
      <div class="glass-card rounded-3xl p-8 shadow-2xl">
        <!-- Toggle -->
        <div class="mb-8 relative bg-gray-100 rounded-full p-1 flex">
          <div id="toggle-bg" class="toggle-bg absolute top-1 left-1 h-10 w-[calc(50%-0.25rem)] bg-indigo-600 rounded-full shadow-md"></div>
          <button id="admin-toggle-btn" class="relative z-10 w-1/2 py-2 text-sm font-semibold text-white transition">
            Admin
          </button>
          <button id="candidate-toggle-btn" class="relative z-10 w-1/2 py-2 text-sm font-semibold text-gray-600 transition">
            Candidate
          </button>
        </div>

        <!-- Admin Login -->
        <div id="admin-login-form">
          <form class="space-y-5">
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-2">Email Address</label>
              <input type="email" name="email" placeholder="company@example.com" required
                class="w-full bg-white border border-gray-300 rounded-xl px-4 py-3 text-gray-900 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition" />
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-2">Password</label>
              <input type="password" name="password" placeholder="••••••••" required
                class="w-full bg-white border border-gray-300 rounded-xl px-4 py-3 text-gray-900 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition" />
            </div>
            <button type="submit"
              class="w-full bg-indigo-600 text-white font-semibold py-3 rounded-xl hover:bg-indigo-700 transform hover:scale-[1.02] transition shadow-lg">
              Sign In
            </button>
            <p class="text-center text-sm text-gray-600">
              Don't have an account? 
              <button type="button" class="form-toggle-link font-semibold text-indigo-600 hover:text-indigo-700">Sign up</button>
            </p>
          </form>
        </div>

        <!-- Admin Register -->
        <div id="admin-register-form" class="hidden">
          <form class="space-y-4">
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-2">Company Name</label>
              <input type="text" name="company_name" placeholder="Acme Inc." required
                class="w-full bg-white border border-gray-300 rounded-xl px-4 py-3 text-gray-900 focus:outline-none focus:ring-2 focus:ring-indigo-500 transition" />
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-2">Email</label>
              <input type="email" name="email" placeholder="hr@company.com" required
                class="w-full bg-white border border-gray-300 rounded-xl px-4 py-3 text-gray-900 focus:outline-none focus:ring-2 focus:ring-indigo-500 transition" />
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-2">Phone</label>
              <input type="tel" name="phone" placeholder="+1 (555) 000-0000" required
                class="w-full bg-white border border-gray-300 rounded-xl px-4 py-3 text-gray-900 focus:outline-none focus:ring-2 focus:ring-indigo-500 transition" />
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-2">Password</label>
              <input type="password" name="password" placeholder="••••••••" required
                class="w-full bg-white border border-gray-300 rounded-xl px-4 py-3 text-gray-900 focus:outline-none focus:ring-2 focus:ring-indigo-500 transition" />
            </div>
            <button type="submit"
              class="w-full bg-indigo-600 text-white font-semibold py-3 rounded-xl hover:bg-indigo-700 transform hover:scale-[1.02] transition shadow-lg">
              Create Account
            </button>
            <p class="text-center text-sm text-gray-600">
              Already have an account? 
              <button type="button" class="form-toggle-link font-semibold text-indigo-600 hover:text-indigo-700">Sign in</button>
            </p>
          </form>
        </div>

        <!-- Candidate Login -->
        <div id="candidate-login-form" class="hidden">
          <form class="space-y-5">
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-2">Email Address</label>
              <input type="email" name="email" placeholder="you@example.com" required
                class="w-full bg-white border border-gray-300 rounded-xl px-4 py-3 text-gray-900 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition" />
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-2">Password</label>
              <input type="password" name="password" placeholder="••••••••" required
                class="w-full bg-white border border-gray-300 rounded-xl px-4 py-3 text-gray-900 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition" />
            </div>
            <button type="submit"
              class="w-full bg-indigo-600 text-white font-semibold py-3 rounded-xl hover:bg-indigo-700 transform hover:scale-[1.02] transition shadow-lg">
              Sign In
            </button>
            <p class="text-center text-sm text-gray-600">
              New here? 
              <button type="button" class="form-toggle-link font-semibold text-indigo-600 hover:text-indigo-700">Create account</button>
            </p>
          </form>
        </div>

        <!-- Candidate Register -->
        <div id="candidate-register-form" class="hidden">
          <form class="space-y-4">
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-2">Full Name</label>
              <input type="text" name="name" placeholder="John Doe" required
                class="w-full bg-white border border-gray-300 rounded-xl px-4 py-3 text-gray-900 focus:outline-none focus:ring-2 focus:ring-indigo-500 transition" />
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-2">Email</label>
              <input type="email" name="email" placeholder="you@example.com" required
                class="w-full bg-white border border-gray-300 rounded-xl px-4 py-3 text-gray-900 focus:outline-none focus:ring-2 focus:ring-indigo-500 transition" />
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-2">Password</label>
              <input type="password" name="password" placeholder="••••••••" required
                class="w-full bg-white border border-gray-300 rounded-xl px-4 py-3 text-gray-900 focus:outline-none focus:ring-2 focus:ring-indigo-500 transition" />
            </div>
            <button type="submit"
              class="w-full bg-indigo-600 text-white font-semibold py-3 rounded-xl hover:bg-indigo-700 transform hover:scale-[1.02] transition shadow-lg">
              Create Account
            </button>
            <p class="text-center text-sm text-gray-600">
              Already registered? 
              <button type="button" class="form-toggle-link font-semibold text-indigo-600 hover:text-indigo-700">Sign in</button>
            </p>
          </form>
        </div>

        <p id="auth-error" class="text-red-600 text-center mt-4 text-sm font-medium min-h-[20px]"></p>
      </div>
    </div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const adminToggleBtn = document.getElementById('admin-toggle-btn');
      const candidateToggleBtn = document.getElementById('candidate-toggle-btn');
      const toggleBg = document.getElementById('toggle-bg');
      const authErrorEl = document.getElementById('auth-error');

      const forms = {
        admin: { login: document.getElementById('admin-login-form'), register: document.getElementById('admin-register-form') },
        candidate: { login: document.getElementById('candidate-login-form'), register: document.getElementById('candidate-register-form') }
      };

      let activeUserType = 'admin';
      let activeFormType = 'login';

      function updateVisibleForm() {
        Object.values(forms).forEach(userTypeForms => {
          Object.values(userTypeForms).forEach(form => form.classList.add('hidden'));
        });
        forms[activeUserType][activeFormType].classList.remove('hidden');
        authErrorEl.textContent = '';
      }

      adminToggleBtn.addEventListener('click', () => {
        if (activeUserType === 'candidate') {
          activeUserType = 'admin';
          activeFormType = 'login';
          toggleBg.style.transform = 'translateX(0%)';
          adminToggleBtn.classList.remove('text-gray-600');
          adminToggleBtn.classList.add('text-white');
          candidateToggleBtn.classList.remove('text-white');
          candidateToggleBtn.classList.add('text-gray-600');
          updateVisibleForm();
        }
      });

      candidateToggleBtn.addEventListener('click', () => {
        if (activeUserType === 'admin') {
          activeUserType = 'candidate';
          activeFormType = 'login';
          toggleBg.style.transform = 'translateX(calc(100% + 0.25rem))';
          candidateToggleBtn.classList.remove('text-gray-600');
          candidateToggleBtn.classList.add('text-white');
          adminToggleBtn.classList.remove('text-white');
          adminToggleBtn.classList.add('text-gray-600');
          updateVisibleForm();
        }
      });

      document.querySelectorAll('.form-toggle-link').forEach(link => {
        link.addEventListener('click', () => {
          activeFormType = (activeFormType === 'login') ? 'register' : 'login';
          updateVisibleForm();
        });
      });

      async function handleFormSubmit(e, endpoint, redirectUrl) {
        e.preventDefault();
        const submitButton = e.target.querySelector('button[type="submit"]');
        const originalButtonText = submitButton.textContent;
        submitButton.textContent = 'Processing...';
        submitButton.disabled = true;
        authErrorEl.textContent = '';

        const formData = new FormData(e.target);
        const data = Object.fromEntries(formData.entries());

        try {
            const response = await fetch(endpoint, {
              method: 'POST',
              credentials: 'same-origin',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify(data)
            });
          const result = await response.json();
          if (!response.ok) throw new Error(result.error);

          if (redirectUrl) {
            window.location.href = redirectUrl;
          } else {
            alert(result.message);
            activeFormType = 'login';
            updateVisibleForm();
          }
        } catch (error) {
          authErrorEl.textContent = error.message;
        } finally {
          submitButton.textContent = originalButtonText;
          submitButton.disabled = false;
        }
      }

      forms.admin.login.querySelector('form').addEventListener('submit', (e) => handleFormSubmit(e, '/api/login/admin', '/dashboard'));
      forms.admin.register.querySelector('form').addEventListener('submit', (e) => handleFormSubmit(e, '/api/register/admin'));
      forms.candidate.login.querySelector('form').addEventListener('submit', (e) => handleFormSubmit(e, '/api/login/candidate', '/candidate/dashboard'));
      forms.candidate.register.querySelector('form').addEventListener('submit', (e) => handleFormSubmit(e, '/api/register/candidate'));
    });
  </script>
</body>
</html>
